name: Daily Blog Generation

on:
  schedule:
    # Run at 11:10 UTC daily
    - cron: '10 11 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    
    defaults:
      run:
        working-directory: ./admaker

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install replicate

      - name: Run Generation Script
        env:
          REPLICATE_API_TOKEN: ${{ secrets.REPLICATE_API_TOKEN }}
          VEO_API_KEY: ${{ secrets.VEO_API_KEY }}
        run: node generate-daily-blog.js

      - name: Commit and Push
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
          GITHUB_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          cd $GITHUB_WORKSPACE
          git add -A
          if git diff --staged --quiet; then
            echo "✅ No changes to commit"
          else
            git commit -m "Auto-generated blog posts (SEO Optimized)"
            echo "📦 Commit created. Pulling latest changes..."
            if [ -n "$GH_PAT" ]; then
              git remote set-url origin "https://x-access-token:${GH_PAT}@github.com/${REPO}.git"
              git pull --rebase origin main
              git push origin main
              echo "✅ Push with PAT successful - Vercel should trigger a new deployment!"
            else
              git remote set-url origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${REPO}.git"
              git pull --rebase origin main
              git push origin main
              echo "⚠️ No GH_PAT found, pushed with default token (Vercel may not rebuild)"
            fi
          fi

      - name: Trigger Vercel Deploy Hook (fallback)
        env:
          VERCEL_DEPLOY_HOOK_URL: ${{ secrets.VERCEL_DEPLOY_HOOK_URL }}
        run: |
          if [ -n "$VERCEL_DEPLOY_HOOK_URL" ]; then
            echo "🚀 Triggering Vercel deploy hook..."
            curl -X POST "$VERCEL_DEPLOY_HOOK_URL"
            echo "✅ Vercel deploy hook triggered!"
          fi
