name: Daily Blog Generation

on:
  schedule:
    # Run at 11:10 UTC daily
    - cron: '10 11 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    
    defaults:
      run:
        working-directory: ./admaker

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install replicate

      - name: Run Generation Script
        env:
          REPLICATE_API_TOKEN: ${{ secrets.REPLICATE_API_TOKEN }}
          VEO_API_KEY: ${{ secrets.VEO_API_KEY }}
        run: node generate-daily-blog.js

      - name: Commit and Push
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          cd $GITHUB_WORKSPACE
          git add -A
          if git diff --staged --quiet; then
            echo "✅ No changes to commit"
          else
            git commit -m "Auto-generated blog posts (SEO Optimized)"
            echo "📦 Commit created. Pulling latest changes..."
            git pull --rebase origin main
            echo "🚀 Pushing to origin..."
            git push origin main
            echo "✅ Push successful!"
          fi
